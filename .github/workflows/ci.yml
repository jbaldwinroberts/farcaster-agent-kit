name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: node bin/cli.mjs help
      - run: node -e "import('./src/index.mjs').then(m => console.log('Exports:', Object.keys(m).join(', ')))"
